services:
  temporal:
    image: temporalio/auto-setup:1.21.0
    container_name: temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PWD=password123
      - POSTGRES_SEEDS=db
      - DYNAMIC_CONFIG_PATH=config/dynamicConfig/development.sql.yml
    depends_on:
      - db
    volumes:
      - ./temporal/dynamicConfig:/etc/temporal/config/dynamicConfig
  db:
    image: postgres:15.4-alpine
    container_name: db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: calendlydb
    ports:
      - "5432:5432"
    
  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: temporal-ui

    ports:
      - "8080:8080"

    environment:
      - TEMPORAL_ADDRESS=temporal:7233

    depends_on:
      - temporal